---
# =============================================================================
# Ansible Playbook - Fedora XFCE 43 Workstation
# =============================================================================
# Usage: ansible-playbook -i localhost, -c local playbook.yml --ask-become-pass
# =============================================================================

- name: Setup Fedora XFCE 43 Workstation
  hosts: localhost
  connection: local
  become: false

  vars:
    user_home: "{{ ansible_env.HOME }}"
    dotfiles_repo: "https://github.com/fscotto/dotfiles"
    dotfiles_dir: "{{ user_home }}/.dotfiles"
    java_version: "temurin-17"
    security_profile: "enterprise_dev_balanced"
    security_enable_pam_hardening: true
    security_enable_sudo_hardening: true
    security_enable_session_timeout: true
    security_enable_automatic_updates: true
    security_enable_local_audit_scans: true
    security_pwquality_minlen: 14
    security_pwquality_minclass: 3
    security_faillock_deny: 5
    security_faillock_fail_interval: 900
    security_faillock_unlock_time: 900
    security_shell_timeout_seconds: 1800
    yubikey_enable_luks2: true
    yubikey_enable_pam: true
    yubikey_password_fallback: true
    yubikey_fido2_device: "auto"
    yubikey_token_timeout: "10"
    yubikey_pam_users:
      - "{{ ansible_user_id }}"

    base_packages:
      - btrfs-progs
      - ca-certificates
      - curl
      - dnf-plugins-core
      - gcc
      - gcc-c++
      - git
      - gnupg2
      - make
      - wget

    cli_packages:
      - NetworkManager-openconnect
      - bat
      - clang
      - clang-tools-extra
      - dbus-devel
      - entr
      - ffmpeg-free
      - ffmpegthumbnailer
      - flameshot
      - fzf
      - gdb
      - gh
      - git-crypt
      - glab
      - golang
      - inotify-tools
      - jq
      - libreoffice
      - ltrace
      - luarocks
      - mesa-dri-drivers
      - net-tools
      - neovim
      - ninja-build
      - nodejs
      - openssh-clients
      - pinentry
      - pinentry-gnome3
      - pipx
      - pkgconf
      - playerctl
      - plocate
      - podman
      - poppler-utils
      - python3-flake8
      - python3-isort
      - python3-mypy
      - python3-pip
      - python3-pylint
      - python3-pytest
      - python3-virtualenv
      - qemu-system-x86-core
      - qt5ct
      - qt6ct
      - rclone
      - ripgrep
      - rsync
      - rustup
      - stow
      - strace
      - tealdeer
      - thunderbird
      - tmux
      - unar
      - unzip
      - valgrind
      - xournalpp
      - xorg-x11-server-Xwayland
      - yt-dlp

    optional_cli_packages:
      - git-delta
      - fastfetch
      - fd-find
      - papirus-icon-theme
      - shotwell
      - yarnpkg

    flatpak_apps:
      - com.google.Chrome
      - org.telegram.desktop
      - com.spotify.Client
      - com.getpostman.Postman
      - sh.loft.devpod

    stow_packages:
      - bash
      - starship
      - emacs
      - git
      - fastfetch
      - flameshot
      - tmux
      - bat

    nerd_fonts:
      - "0xProto"
      - "ComicShannsMono"
      - "FiraCode"
      - "JetBrainsMono"
      - "UbuntuMono"
      - "UbuntuSans"
      - "Iosevka"

    btrfs_extra_subvolumes:
      - "@log"
      - "@cache"
      - "@snapshots"
      - "@libvirt"

    sysctl_hardening:
      - { key: "kernel.randomize_va_space", value: "2" }
      - { key: "kernel.kptr_restrict", value: "2" }
      - { key: "kernel.dmesg_restrict", value: "1" }
      - { key: "kernel.yama.ptrace_scope", value: "1" }
      - { key: "fs.suid_dumpable", value: "0" }
      - { key: "fs.protected_hardlinks", value: "1" }
      - { key: "fs.protected_symlinks", value: "1" }
      - { key: "fs.protected_fifos", value: "2" }
      - { key: "fs.protected_regular", value: "2" }
      - { key: "net.ipv4.conf.all.rp_filter", value: "1" }
      - { key: "net.ipv4.conf.default.rp_filter", value: "1" }
      - { key: "net.ipv4.icmp_echo_ignore_broadcasts", value: "1" }
      - { key: "net.ipv4.conf.all.accept_redirects", value: "0" }
      - { key: "net.ipv4.conf.default.accept_redirects", value: "0" }
      - { key: "net.ipv6.conf.all.accept_redirects", value: "0" }
      - { key: "net.ipv6.conf.default.accept_redirects", value: "0" }

  tasks:
    - name: Apply storage baseline
      import_tasks: tasks/10_storage.yml

    - name: Apply workstation security baseline
      import_tasks: tasks/20_security.yml

    - name: Install system packages
      import_tasks: tasks/30_system.yml

    - name: Install desktop applications
      import_tasks: tasks/40_apps.yml

    - name: Install developer tooling
      import_tasks: tasks/50_dev_tooling.yml

    - name: Configure identity and authentication
      import_tasks: tasks/60_identity.yml

    - name: Configure user environment
      import_tasks: tasks/70_user_env.yml

  handlers:
    - name: Regenerate grub config
      become: true
      shell: |
        if [ -d /sys/firmware/efi ]; then
          grub2-mkconfig -o /boot/efi/EFI/fedora/grub.cfg
        else
          grub2-mkconfig -o /boot/grub2/grub.cfg
        fi

    - name: Reload udev rules
      become: true
      command: udevadm control --reload-rules

    - name: Trigger udev
      become: true
      command: udevadm trigger

    - name: Regenerate initramfs
      become: true
      command: dracut -f

    - name: Reload systemd daemon
      become: true
      systemd:
        daemon_reload: true
