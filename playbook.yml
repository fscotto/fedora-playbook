---
# =============================================================================
# Ansible Playbook - Fedora XFCE 43 Workstation
# =============================================================================
# Usage: ansible-playbook -i localhost, -c local playbook.yml --ask-become-pass
# =============================================================================

- name: Setup Fedora XFCE 43 Workstation
  hosts: localhost
  connection: local
  become: false

  vars:
    user_home: "{{ ansible_env.HOME }}"
    dotfiles_repo: "https://github.com/fscotto/dotfiles"
    dotfiles_dir: "{{ user_home }}/.dotfiles"
    java_version: "temurin-17"
    yubikey_enable_luks2: true
    yubikey_enable_pam: true
    yubikey_password_fallback: true
    yubikey_fido2_device: "auto"
    yubikey_token_timeout: "10"
    yubikey_pam_users:
      - "{{ ansible_user_id }}"

    base_packages:
      - btrfs-progs
      - ca-certificates
      - curl
      - dnf-plugins-core
      - gcc
      - gcc-c++
      - git
      - gnupg2
      - make
      - wget

    cli_packages:
      - NetworkManager-openconnect
      - bat
      - clang
      - clang-tools-extra
      - dbus-devel
      - entr
      - ffmpeg
      - ffmpegthumbnailer
      - flameshot
      - fzf
      - gdb
      - gh
      - git-crypt
      - glab
      - golang
      - inotify-tools
      - jq
      - libreoffice
      - ltrace
      - luarocks
      - mesa-dri-drivers
      - net-tools
      - neovim
      - ninja-build
      - nodejs
      - npm
      - openssh-clients
      - pinentry
      - pinentry-gtk
      - pipx
      - pkgconf
      - playerctl
      - plocate
      - podman
      - poppler-utils
      - python3-flake8
      - python3-isort
      - python3-mypy
      - python3-pip
      - python3-pylint
      - python3-pytest
      - python3-virtualenv
      - qemu-system-x86-core
      - qt5ct
      - qt6ct
      - rclone
      - ripgrep
      - rsync
      - rustup
      - stow
      - strace
      - tealdeer
      - thunderbird
      - tmux
      - unar
      - unzip
      - valgrind
      - xournalpp
      - xorg-x11-server-Xwayland
      - yt-dlp

    optional_cli_packages:
      - delta
      - fastfetch
      - fd-find
      - papirus-icon-theme
      - shotwell
      - yarnpkg

    flatpak_apps:
      - com.google.Chrome
      - org.telegram.desktop
      - com.spotify.Client
      - com.getpostman.Postman
      - sh.loft.devpod

    stow_packages:
      - bash
      - starship
      - emacs
      - git
      - fastfetch
      - flameshot
      - tmux
      - bat

    btrfs_extra_subvolumes:
      - "@log"
      - "@cache"
      - "@snapshots"
      - "@libvirt"

    sysctl_hardening:
      - { key: "kernel.randomize_va_space", value: "2" }
      - { key: "kernel.kptr_restrict", value: "2" }
      - { key: "kernel.dmesg_restrict", value: "1" }
      - { key: "kernel.yama.ptrace_scope", value: "1" }
      - { key: "fs.suid_dumpable", value: "0" }
      - { key: "fs.protected_hardlinks", value: "1" }
      - { key: "fs.protected_symlinks", value: "1" }
      - { key: "fs.protected_fifos", value: "2" }
      - { key: "fs.protected_regular", value: "2" }
      - { key: "net.ipv4.conf.all.rp_filter", value: "1" }
      - { key: "net.ipv4.conf.default.rp_filter", value: "1" }
      - { key: "net.ipv4.icmp_echo_ignore_broadcasts", value: "1" }
      - { key: "net.ipv4.conf.all.accept_redirects", value: "0" }
      - { key: "net.ipv4.conf.default.accept_redirects", value: "0" }
      - { key: "net.ipv6.conf.all.accept_redirects", value: "0" }
      - { key: "net.ipv6.conf.default.accept_redirects", value: "0" }

  tasks:
    - name: Run preflight checks
      import_tasks: tasks/00_preflight.yml

    - name: Configure Btrfs layout
      import_tasks: tasks/10_btrfs_layout.yml

    - name: Apply hardening baseline
      import_tasks: tasks/20_hardening.yml

    - name: Install RPM packages
      import_tasks: tasks/30_packages.yml

    - name: Configure Snapper and GRUB
      import_tasks: tasks/11_snapper_grub.yml

    - name: Install Flatpak applications
      import_tasks: tasks/40_flatpak.yml

    - name: Install developer tooling
      import_tasks: tasks/50_tooling.yml

    - name: Configure YubiKey support
      import_tasks: tasks/60_yubikey.yml

    - name: Configure YubiKey for LUKS2 unlock
      import_tasks: tasks/61_yubikey_luks2.yml

    - name: Configure YubiKey for PAM login and sudo
      import_tasks: tasks/62_yubikey_pam.yml

    - name: Configure dotfiles
      import_tasks: tasks/70_dotfiles.yml

  handlers:
    - name: Regenerate grub config
      become: true
      shell: |
        if [ -d /sys/firmware/efi ]; then
          grub2-mkconfig -o /boot/efi/EFI/fedora/grub.cfg
        else
          grub2-mkconfig -o /boot/grub2/grub.cfg
        fi

    - name: Reload udev rules
      become: true
      command: udevadm control --reload-rules

    - name: Trigger udev
      become: true
      command: udevadm trigger

    - name: Regenerate initramfs
      become: true
      command: dracut -f
