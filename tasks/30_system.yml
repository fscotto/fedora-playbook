- name: Update DNF cache and upgrade installed packages
  become: true
  dnf:
    name: "*"
    state: latest
    update_cache: true

- name: Install base dependencies
  become: true
  dnf:
    name: "{{ base_packages }}"
    state: present

- name: Enable RPM Fusion repositories
  become: true
  dnf:
    name:
      - "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm"
      - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"
    state: present
    disable_gpg_check: true

- name: Refresh DNF cache after enabling RPM Fusion
  become: true
  dnf:
    update_cache: true

- name: Install CLI tools and utilities
  become: true
  dnf:
    name: "{{ cli_packages }}"
    state: present

- name: Check OpenCode package availability
  become: true
  command: dnf -q list --available opencode
  register: opencode_package_available
  changed_when: false
  failed_when: false

- name: Install OpenCode via DNF when available
  become: true
  dnf:
    name: opencode
    state: present
  when: opencode_package_available.rc == 0

- name: Warn when OpenCode package is unavailable
  debug:
    msg: "OpenCode package is not available in current repositories. Skipping DNF installation for opencode."
  when: opencode_package_available.rc != 0

- name: Install optional CLI tools and utilities
  become: true
  dnf:
    name: "{{ optional_cli_packages }}"
    state: present
  ignore_errors: true
