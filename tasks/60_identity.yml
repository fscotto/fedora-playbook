- name: Install YubiKey and smartcard packages
  become: true
  dnf:
    name:
      - authselect
      - cryptsetup
      - fido2-tools
      - gnupg2
      - opensc
      - pam-u2f
      - pcsc-lite
      - pcsc-lite-ccid
      - yubikey-manager
      - ykpers
    state: present

- name: Enable and start pcscd socket
  become: true
  systemd:
    name: pcscd.socket
    enabled: true
    state: started

- name: Create YubiKey udev rules
  become: true
  copy:
    dest: /etc/udev/rules.d/70-yubikey.rules
    mode: "0644"
    content: |
      # YubiKey FIDO/U2F access
      KERNEL=="hidraw*", SUBSYSTEM=="hidraw", ATTRS{idVendor}=="1050", MODE="0660", TAG+="uaccess"
      ACTION=="add|change", SUBSYSTEM=="usb", ATTR{idVendor}=="1050", MODE="0660", TAG+="uaccess"
  notify:
    - Reload udev rules
    - Trigger udev

- name: Create Yubico config directory
  file:
    path: "{{ user_home }}/.config/Yubico"
    state: directory
    mode: "0755"

- name: Configure YubiKey FIDO2 unlock for LUKS2 root volume
  when: yubikey_enable_luks2 | bool
  become: true
  block:
    - name: Detect root mount source
      command: findmnt -n -o SOURCE /
      register: root_mount_source
      changed_when: false

    - name: Normalize root mount source device path
      set_fact:
        root_mount_source_device: "{{ root_mount_source.stdout | regex_replace('\\[.*\\]$', '') }}"

    - name: Detect crypt mapper in root ancestry
      shell: "lsblk -sno TYPE,NAME {{ root_mount_source_device | quote }} | awk '$1==\"crypt\" {print $2; exit}'"
      register: root_crypt_mapper_name
      changed_when: false
      failed_when: false

    - name: Resolve backing block device from detected crypt mapper
      command: "lsblk -ndo PKNAME /dev/mapper/{{ root_crypt_mapper_name.stdout }}"
      register: root_crypt_mapper_pkname
      changed_when: false
      failed_when: false
      when: root_crypt_mapper_name.stdout | length > 0

    - name: Set LUKS device path from detected crypt mapper chain
      set_fact:
        root_luks_device: "/dev/{{ root_crypt_mapper_pkname.stdout }}"
      when:
        - root_crypt_mapper_pkname is defined
        - root_crypt_mapper_pkname.stdout | length > 0

    - name: Derive root mapper name
      set_fact:
        root_mapper_name: "{{ root_mount_source_device | regex_replace('^/dev/mapper/', '') }}"
      when: root_mount_source_device is match('^/dev/mapper/.+')

    - name: Read root mapping entry from /etc/crypttab
      command: "awk '$1 !~ /^#/ && $1==\"{{ root_mapper_name }}\" {print; exit}' /etc/crypttab"
      register: root_crypttab_line
      changed_when: false
      failed_when: false
      when: root_mapper_name is defined

    - name: Parse root /etc/crypttab fields
      set_fact:
        root_crypttab_fields: "{{ root_crypttab_line.stdout.split() }}"
      when:
        - root_crypttab_line is defined
        - root_crypttab_line.stdout | length > 0

    - name: Resolve LUKS device from /etc/crypttab source
      command: "blkid -U {{ root_crypttab_fields[1] | regex_replace('^UUID=', '') }}"
      register: root_luks_from_uuid
      changed_when: false
      failed_when: false
      when:
        - root_crypttab_fields is defined
        - root_crypttab_fields | length >= 2
        - root_crypttab_fields[1] is match('^UUID=')

    - name: Set LUKS device path from /etc/crypttab UUID
      set_fact:
        root_luks_device: "{{ root_luks_from_uuid.stdout }}"
      when:
        - root_luks_from_uuid is defined
        - root_luks_from_uuid.stdout | length > 0

    - name: Set LUKS device path from /etc/crypttab direct path
      set_fact:
        root_luks_device: "{{ root_crypttab_fields[1] }}"
      when:
        - root_luks_device is not defined
        - root_crypttab_fields is defined
        - root_crypttab_fields | length >= 2
        - root_crypttab_fields[1] is match('^/dev/.+')

    - name: Inspect root mapper status via cryptsetup
      command: "cryptsetup status {{ root_mapper_name }}"
      register: root_mapper_status
      changed_when: false
      failed_when: false
      when:
        - root_mapper_name is defined
        - root_luks_device is not defined

    - name: Set LUKS backing device path from cryptsetup status
      set_fact:
        root_luks_device: "{{ root_mapper_status.stdout | regex_search('device:\\s*(\\S+)', '\\1') | default('', true) }}"
      when:
        - root_mapper_status is defined
        - root_mapper_status.rc == 0
        - (root_mapper_status.stdout | regex_search('device:\\s*(\\S+)', '\\1') | default('', true)) | length > 0

    - name: Resolve backing block device for root mapper
      command: "lsblk -ndo PKNAME {{ root_mount_source_device }}"
      register: root_backing_pkname
      changed_when: false
      failed_when: false
      when:
        - root_mapper_name is defined
        - root_luks_device is not defined

    - name: Set LUKS backing device path
      set_fact:
        root_luks_device: "/dev/{{ root_backing_pkname.stdout }}"
      when:
        - root_mapper_name is defined
        - root_luks_device is not defined
        - root_backing_pkname.stdout | length > 0

    - name: Warn when LUKS backing device cannot be resolved
      debug:
        msg: "Could not resolve backing block device for {{ root_mount_source_device }}. Skipping LUKS2 FIDO2 enrollment."
      when:
        - root_mapper_name is defined
        - root_luks_device is not defined

    - name: Verify root device is LUKS2
      command: "cryptsetup luksDump {{ root_luks_device }}"
      register: root_luks_dump
      changed_when: false
      when: root_luks_device is defined

    - name: Assert root encrypted device uses LUKS2
      assert:
        that:
          - root_luks_dump.stdout is search('Version:\\s+2')
        fail_msg: "Root encrypted device is not LUKS2. YubiKey FIDO2 enrollment requires LUKS2."
      when: root_luks_device is defined

    - name: Inspect existing LUKS tokens
      command: "systemd-cryptenroll --dump {{ root_luks_device }}"
      register: root_luks_tokens
      changed_when: false
      when: root_luks_device is defined

    - name: Enroll YubiKey FIDO2 token for LUKS2
      command: >-
        systemd-cryptenroll
        --fido2-device={{ yubikey_fido2_device }}
        --fido2-with-user-presence=yes
        --fido2-with-user-verification=yes
        {{ root_luks_device }}
      register: yubikey_luks_enroll
      when:
        - root_luks_device is defined
        - root_luks_tokens.stdout is not search('(?i)fido2')
      notify: Regenerate initramfs

    - name: Build updated /etc/crypttab options for FIDO2
      set_fact:
        root_crypttab_source: "{{ root_crypttab_fields[1] }}"
        root_crypttab_keyfile: "{{ root_crypttab_fields[2] | default('none') }}"
        root_crypttab_options: "{{ root_crypttab_fields[3] | default('') }}"
        root_crypttab_new_options: >-
          {{
            (root_crypttab_fields[3] | default('') | length > 0)
            | ternary(
                root_crypttab_fields[3] + ',fido2-device=' + yubikey_fido2_device,
                'fido2-device=' + yubikey_fido2_device
              )
          }}
      when:
        - root_crypttab_fields is defined
        - root_crypttab_fields | length >= 2

    - name: Add fido2-device option to root /etc/crypttab entry
      lineinfile:
        path: /etc/crypttab
        regexp: "^{{ root_mapper_name }}\\s+"
        line: "{{ root_mapper_name }} {{ root_crypttab_source }} {{ root_crypttab_keyfile }} {{ root_crypttab_new_options }}"
      register: yubikey_crypttab_update
      when:
        - root_mapper_name is defined
        - root_crypttab_line is defined
        - root_crypttab_line.stdout | length > 0
        - root_crypttab_line.stdout is not search('fido2-device=')
      notify: Regenerate initramfs

    - name: Warn when root mapper entry is missing in /etc/crypttab
      debug:
        msg: "No /etc/crypttab entry found for {{ root_mapper_name }}. FIDO2 unlock may require manual crypttab options."
      when:
        - root_mapper_name is defined
        - root_crypttab_line is defined
        - root_crypttab_line.stdout | length == 0

    - name: Skip LUKS2 YubiKey setup when root is not mapper-backed
      debug:
        msg: "Root source is {{ root_mount_source_device }}. Skipping LUKS2 FIDO2 enrollment."
      when: root_mapper_name is not defined

- name: Configure PAM U2F for login and sudo with password fallback
  when: yubikey_enable_pam | bool
  become: true
  block:
    - name: Verify authselect is available
      command: authselect --version
      register: authselect_version
      changed_when: false
      failed_when: false

    - name: Assert authselect is installed
      assert:
        that:
          - authselect_version.rc == 0
        fail_msg: "authselect is required to manage PAM configuration safely on Fedora."

    - name: Check authselect integrity
      command: authselect check
      register: authselect_check
      changed_when: false
      failed_when: false

    - name: Assert current PAM stack is managed by authselect
      assert:
        that:
          - authselect_check.rc == 0
        fail_msg: "PAM stack is not in a valid authselect state. Repair authselect before enabling YubiKey PAM."

    - name: Get current authselect profile state
      command: authselect current
      register: authselect_current
      changed_when: false

    - name: Enable authselect with-pam-u2f feature
      command: authselect enable-feature with-pam-u2f
      register: authselect_u2f_feature
      when: authselect_current.stdout is not search('with-pam-u2f')

    - name: Apply authselect changes
      command: authselect apply-changes -b
      when: authselect_u2f_feature is changed

    - name: Ensure sudo PAM stack includes system-auth
      lineinfile:
        path: /etc/pam.d/sudo
        regexp: '^auth\\s+include\\s+system-auth$'
        line: 'auth       include      system-auth'
        state: present

    - name: Resolve home directories for YubiKey PAM users
      command: "getent passwd {{ item }}"
      register: yubikey_pam_passwd
      changed_when: false
      failed_when: false
      loop: "{{ yubikey_pam_users }}"

    - name: Assert all YubiKey PAM users exist
      assert:
        that:
          - item.rc == 0
        fail_msg: "User {{ item.item }} does not exist. Cannot configure U2F mapping."
      loop: "{{ yubikey_pam_passwd.results }}"

    - name: Ensure Yubico config directory exists for target users
      file:
        path: "{{ item.stdout.split(':')[5] }}/.config/Yubico"
        state: directory
        mode: "0700"
        owner: "{{ item.item }}"
        group: "{{ item.item }}"
      loop: "{{ yubikey_pam_passwd.results }}"

    - name: Create or update per-user U2F mapping with idempotent fallback
      become_user: "{{ item.item }}"
      shell: |
        set -euo pipefail
        export HOME="{{ item.stdout.split(':')[5] }}"
        authfile="$HOME/.config/Yubico/u2f_keys"
        if [ -f "$authfile" ] && grep -q "^{{ item.item }}:" "$authfile"; then
          echo "unchanged"
          exit 0
        fi
        new_line="$(pamu2fcfg -u {{ item.item }})"
        if [ -f "$authfile" ]; then
          printf '%s\n' "$new_line" >> "$authfile"
        else
          printf '%s\n' "$new_line" > "$authfile"
        fi
        chmod 600 "$authfile"
        echo "changed"
      register: pam_u2f_user_map
      changed_when: "'changed' in pam_u2f_user_map.stdout"
      loop: "{{ yubikey_pam_passwd.results }}"

    - name: Verify password fallback remains enabled in auth stack
      assert:
        that:
          - yubikey_password_fallback | bool
        fail_msg: "Password fallback must remain enabled for login and sudo safety."
