- name: Verify target distribution is Fedora
  assert:
    that:
      - ansible_distribution == "Fedora"
    fail_msg: "This playbook supports Fedora XFCE only."
    success_msg: "Fedora detected, continuing setup."

- name: Detect root filesystem type
  command: findmnt -n -o FSTYPE /
  register: root_fs_type
  changed_when: false

- name: Ensure btrfs-progs is installed for Btrfs operations
  become: true
  dnf:
    name: btrfs-progs
    state: present
  when: root_fs_type.stdout == "btrfs"

- name: Configure additional Btrfs subvolumes
  when: root_fs_type.stdout == "btrfs"
  become: true
  block:
    - name: Detect root filesystem source
      command: findmnt -n -o SOURCE --nofsroot /
      register: root_fs_source
      changed_when: false

    - name: Normalize root filesystem source device path
      set_fact:
        root_fs_source_device: "{{ root_fs_source.stdout | regex_replace('\\[.*\\]$', '') }}"

    - name: Create temporary mountpoint for Btrfs top-level
      file:
        path: /mnt/btrfs-top-level
        state: directory
        mode: "0755"

    - name: Mount Btrfs top-level subvolume
      mount:
        path: /mnt/btrfs-top-level
        src: "{{ root_fs_source_device }}"
        fstype: btrfs
        opts: subvolid=5
        state: mounted

    - name: Create additional Btrfs subvolumes
      command: "btrfs subvolume create /mnt/btrfs-top-level/{{ item }}"
      args:
        creates: "/mnt/btrfs-top-level/{{ item }}"
      loop: "{{ btrfs_extra_subvolumes }}"

    - name: Check current /var/cache mount options
      command: findmnt -n -o OPTIONS /var/cache
      register: var_cache_mount_opts
      changed_when: false
      failed_when: false

    - name: Check current /var/log mount options
      command: findmnt -n -o OPTIONS /var/log
      register: var_log_mount_opts
      changed_when: false
      failed_when: false

    - name: Check current /var/lib/libvirt mount options
      command: findmnt -n -o OPTIONS /var/lib/libvirt
      register: libvirt_mount_opts
      changed_when: false
      failed_when: false

    - name: Create temporary mountpoint for @cache migration
      file:
        path: /mnt/btrfs-migrate-cache
        state: directory
        mode: "0755"
      when: "'subvol=@cache' not in var_cache_mount_opts.stdout"

    - name: Mount @cache subvolume for migration
      mount:
        path: /mnt/btrfs-migrate-cache
        src: "{{ root_fs_source_device }}"
        fstype: btrfs
        opts: subvol=@cache
        state: mounted
      when: "'subvol=@cache' not in var_cache_mount_opts.stdout"

    - name: Copy existing /var/cache data into @cache
      command: rsync -aHAX --numeric-ids /var/cache/ /mnt/btrfs-migrate-cache/
      when: "'subvol=@cache' not in var_cache_mount_opts.stdout"

    - name: Empty /var/cache data from root subvolume
      command: find /var/cache -mindepth 1 -xdev -delete
      changed_when: true
      failed_when: false
      when: "'subvol=@cache' not in var_cache_mount_opts.stdout"

    - name: Unmount @cache migration mountpoint
      mount:
        path: /mnt/btrfs-migrate-cache
        state: unmounted
      failed_when: false
      when: "'subvol=@cache' not in var_cache_mount_opts.stdout"

    - name: Create temporary mountpoint for @log migration
      file:
        path: /mnt/btrfs-migrate-log
        state: directory
        mode: "0755"
      when: "'subvol=@log' not in var_log_mount_opts.stdout"

    - name: Mount @log subvolume for migration
      mount:
        path: /mnt/btrfs-migrate-log
        src: "{{ root_fs_source_device }}"
        fstype: btrfs
        opts: subvol=@log
        state: mounted
      when: "'subvol=@log' not in var_log_mount_opts.stdout"

    - name: Copy existing /var/log data into @log
      command: rsync -aHAX --numeric-ids /var/log/ /mnt/btrfs-migrate-log/
      when: "'subvol=@log' not in var_log_mount_opts.stdout"

    - name: Empty /var/log data from root subvolume
      command: find /var/log -mindepth 1 -xdev -delete
      changed_when: true
      failed_when: false
      when: "'subvol=@log' not in var_log_mount_opts.stdout"

    - name: Unmount @log migration mountpoint
      mount:
        path: /mnt/btrfs-migrate-log
        state: unmounted
      failed_when: false
      when: "'subvol=@log' not in var_log_mount_opts.stdout"

    - name: Ensure /var/lib/libvirt directory exists
      file:
        path: /var/lib/libvirt
        state: directory
        mode: "0755"

    - name: Create temporary mountpoint for @libvirt migration
      file:
        path: /mnt/btrfs-migrate-libvirt
        state: directory
        mode: "0755"
      when: "'subvol=@libvirt' not in libvirt_mount_opts.stdout"

    - name: Mount @libvirt subvolume for migration
      mount:
        path: /mnt/btrfs-migrate-libvirt
        src: "{{ root_fs_source_device }}"
        fstype: btrfs
        opts: subvol=@libvirt
        state: mounted
      when: "'subvol=@libvirt' not in libvirt_mount_opts.stdout"

    - name: Copy existing /var/lib/libvirt data into @libvirt
      command: rsync -aHAX --numeric-ids /var/lib/libvirt/ /mnt/btrfs-migrate-libvirt/
      when: "'subvol=@libvirt' not in libvirt_mount_opts.stdout"

    - name: Empty /var/lib/libvirt data from root subvolume
      command: find /var/lib/libvirt -mindepth 1 -xdev -delete
      changed_when: true
      failed_when: false
      when: "'subvol=@libvirt' not in libvirt_mount_opts.stdout"

    - name: Unmount @libvirt migration mountpoint
      mount:
        path: /mnt/btrfs-migrate-libvirt
        state: unmounted
      failed_when: false
      when: "'subvol=@libvirt' not in libvirt_mount_opts.stdout"

    - name: Mount @cache on /var/cache
      mount:
        path: /var/cache
        src: "{{ root_fs_source_device }}"
        fstype: btrfs
        opts: subvol=@cache,compress=zstd,noatime,nodev,nosuid,noexec
        state: mounted

    - name: Mount @log on /var/log
      mount:
        path: /var/log
        src: "{{ root_fs_source_device }}"
        fstype: btrfs
        opts: subvol=@log,compress=zstd,noatime,nodev,nosuid,noexec
        state: mounted

    - name: Mount @libvirt on /var/lib/libvirt
      mount:
        path: /var/lib/libvirt
        src: "{{ root_fs_source_device }}"
        fstype: btrfs
        opts: subvol=@libvirt,compress=zstd,noatime,nodev,nosuid
        state: mounted

  always:
    - name: Ensure @cache migration mountpoint is unmounted
      mount:
        path: /mnt/btrfs-migrate-cache
        state: unmounted
      failed_when: false

    - name: Ensure @log migration mountpoint is unmounted
      mount:
        path: /mnt/btrfs-migrate-log
        state: unmounted
      failed_when: false

    - name: Ensure @libvirt migration mountpoint is unmounted
      mount:
        path: /mnt/btrfs-migrate-libvirt
        state: unmounted
      failed_when: false

    - name: Unmount Btrfs top-level subvolume
      mount:
        path: /mnt/btrfs-top-level
        state: unmounted
      failed_when: false

- name: Skip Btrfs subvolume setup on non-Btrfs root
  debug:
    msg: "Root filesystem is {{ root_fs_type.stdout }}. Skipping Btrfs subvolume setup."
  when: root_fs_type.stdout != "btrfs"

- name: Configure Snapper and GRUB integration for Btrfs
  when: root_fs_type.stdout == "btrfs"
  become: true
  block:
    - name: Install Snapper
      dnf:
        name: snapper
        state: present

    - name: Install grub-btrfs (optional)
      dnf:
        name: grub-btrfs
        state: present
      ignore_errors: true

    - name: Check current /.snapshots mount options
      command: findmnt -n -o OPTIONS /.snapshots
      register: root_snapshots_mount_opts
      changed_when: false
      failed_when: false

    - name: Ensure /.snapshots directory exists
      file:
        path: /.snapshots
        state: directory
        mode: "0750"

    - name: Create temporary mountpoint for @snapshots migration
      file:
        path: /mnt/btrfs-migrate-snapshots
        state: directory
        mode: "0755"
      when: "'subvol=@snapshots' not in root_snapshots_mount_opts.stdout"

    - name: Mount @snapshots subvolume for migration
      mount:
        path: /mnt/btrfs-migrate-snapshots
        src: "{{ root_fs_source_device }}"
        fstype: btrfs
        opts: subvol=@snapshots
        state: mounted
      when: "'subvol=@snapshots' not in root_snapshots_mount_opts.stdout"

    - name: Copy existing /.snapshots data into @snapshots
      command: rsync -aHAX --numeric-ids /.snapshots/ /mnt/btrfs-migrate-snapshots/
      when: "'subvol=@snapshots' not in root_snapshots_mount_opts.stdout"

    - name: Empty /.snapshots data from root subvolume
      command: find /.snapshots -mindepth 1 -xdev -delete
      changed_when: true
      failed_when: false
      when: "'subvol=@snapshots' not in root_snapshots_mount_opts.stdout"

    - name: Unmount @snapshots migration mountpoint
      mount:
        path: /mnt/btrfs-migrate-snapshots
        state: unmounted
      failed_when: false
      when: "'subvol=@snapshots' not in root_snapshots_mount_opts.stdout"

    - name: Mount @snapshots on /.snapshots
      mount:
        path: /.snapshots
        src: "{{ root_fs_source_device }}"
        fstype: btrfs
        opts: subvol=@snapshots,compress=zstd,noatime,nodev,nosuid
        state: mounted

    - name: Check if Snapper root config exists
      stat:
        path: /etc/snapper/configs/root
      register: snapper_root_config

    - name: Create Snapper root config
      command: snapper -c root create-config /
      when: not snapper_root_config.stat.exists
      notify: Regenerate grub config

    - name: Configure Snapper retention policy
      lineinfile:
        path: /etc/snapper/configs/root
        regexp: '^{{ item.key }}='
        line: "{{ item.key }}=\"{{ item.value }}\""
      loop:
        - { key: "TIMELINE_CREATE", value: "yes" }
        - { key: "TIMELINE_CLEANUP", value: "yes" }
        - { key: "NUMBER_CLEANUP", value: "yes" }
        - { key: "NUMBER_LIMIT", value: "10" }
        - { key: "NUMBER_LIMIT_IMPORTANT", value: "5" }
        - { key: "TIMELINE_LIMIT_HOURLY", value: "8" }
        - { key: "TIMELINE_LIMIT_DAILY", value: "7" }
        - { key: "TIMELINE_LIMIT_WEEKLY", value: "4" }
        - { key: "TIMELINE_LIMIT_MONTHLY", value: "3" }
        - { key: "TIMELINE_LIMIT_YEARLY", value: "0" }

    - name: Enable Snapper timeline timer
      systemd:
        name: snapper-timeline.timer
        enabled: true
        state: started

    - name: Enable Snapper cleanup timer
      systemd:
        name: snapper-cleanup.timer
        enabled: true
        state: started

    - name: Check if grub-btrfs systemd path unit exists
      stat:
        path: /usr/lib/systemd/system/grub-btrfs.path
      register: grub_btrfs_path_unit

    - name: Enable grub-btrfs path unit
      systemd:
        name: grub-btrfs.path
        enabled: true
        state: started
      when: grub_btrfs_path_unit.stat.exists
      notify: Regenerate grub config

  always:
    - name: Ensure @snapshots migration mountpoint is unmounted
      mount:
        path: /mnt/btrfs-migrate-snapshots
        state: unmounted
      failed_when: false
